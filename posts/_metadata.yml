# Default metadata for ALL posts in this folder.
# Individual posts can override any of these values.

author: ""
date-format: "D MMMM YYYY"
lang: id

format:
  html:
    toc: true
    toc-depth: 3
    toc-title: "Daftar Isi"
    number-sections: false
    smooth-scroll: true
    code-copy: true
    link-external-newwindow: true

# Agar setiap post tidak di-re-execute saat build (hemat waktu)
freeze: true

# Tampilkan tanggal modifikasi terakhir di bawah judul artikel
date-modified: today
